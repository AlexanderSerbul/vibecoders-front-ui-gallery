# Крошечный веб-сервер для нашего собранного сайта (папка dist/).
# На сервере Вайбкода запускается командой:  nginx -c /opt/app/nginx.conf
daemon off;                        # держим nginx на переднем плане — им рулит systemd
pid /run/nginx-app.pid;            # свой pid-файл, чтобы не конфликтовать с nginx платформы
events {}
http {
  include /etc/nginx/mime.types;   # правильные типы для .js / .css / .svg
  server {
    listen 3000;                   # порт, который ждёт туннель Вайбкода
    root /opt/app;                 # сюда распакуется наш dist
    location / {
      try_files $uri /index.html;  # нет такого файла → отдаём index.html (маршруты SPA)
    }
  }
}
